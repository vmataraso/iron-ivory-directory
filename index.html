<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Iron & Ivory Property Directory</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      line-height: 1.8;
    }
    h1 { margin-bottom: 20px; }
    .property { margin-bottom: 16px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
  </style>
</head>
<body>
  <h1>Iron &amp; Ivory Property Directory</h1>
  <div id="table-container">Loading...</div>

  <script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQN-HyD_xL7wseQE98-OGlyG7pxnC6FCOITOrBkb0uAoGYBDZPQetginAMafuOtSA6MUct_lEuKpaTG/pub?gid=964797632&single=true&output=csv";

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') { current += '"'; i++; }
          else { inQuotes = !inQuotes; }
        } else if (char === "," && !inQuotes) {
          row.push(current.trim());
          current = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i++;
          if (current.length > 0 || row.length > 0) {
            row.push(current.trim());
            rows.push(row);
            row = [];
            current = "";
          }
        } else {
          current += char;
        }
      }
      if (current.length > 0 || row.length > 0) {
        row.push(current.trim());
        rows.push(row);
      }
      return rows;
    }

    function clean(value) {
      return String(value || "").replace(/\s+/g, " ").replace(/^"+|"+$/g, "").trim();
    }

    function esc(value) {
      return String(value || "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    fetch(sheetUrl)
      .then(r => r.text())
      .then(csv => {
        const rows = parseCSV(csv);
        if (!rows.length) {
          document.getElementById("table-container").innerHTML = "No data found.";
          return;
        }

        const headers = rows[0].map(h => clean(h).toLowerCase());
        const idxName    = headers.findIndex(h => h.includes("property name"));
        const idxAddress = headers.findIndex(h => h.includes("address"));
        const idxManager = headers.findIndex(h => h.includes("assigned manager"));
        const idxEmail   = headers.findIndex(h => h.includes("email"));
        const idxHandles = headers.findIndex(h => h.includes("notes") || h.includes("handles"));

        let html = "";

        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          if (!row || row.every(cell => !String(cell).trim())) continue;

          const name    = clean(row[idxName]    || "");
          const address = clean(row[idxAddress] || "");
          const manager = clean(row[idxManager] || "");
          const email   = clean(row[idxEmail]   || "");
          const handles = clean(row[idxHandles] || "");

          if (!name) continue;

          // Property name is embedded in every sentence so GHL cannot
          // deduplicate records that share the same manager/email/handles.
          html += `
            <div class="property">
              <p>${esc(name)} is located at ${esc(address)}.</p>
              <p>The assigned manager for ${esc(name)} is ${esc(manager)}.</p>
              <p>The contact email for ${esc(name)} is ${esc(email)}.</p>
              <p>${esc(name)} handles: ${esc(handles)}.</p>
            </div>
          `;
        }

        document.getElementById("table-container").innerHTML = html || "No records found.";
      })
      .catch(err => {
        document.getElementById("table-container").innerHTML = "Error loading data.";
        console.error(err);
      });
  </script>
</body>
</html>
