<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Iron & Ivory Property Directory</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      line-height: 1.5;
    }

    h1 {
      margin-bottom: 20px;
    }

    .property {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 14px;
      background: #fafafa;
    }

    .property-field {
      margin: 2px 0;
    }

    .label {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Iron & Ivory Property Directory</h1>
  <div id="table-container">Loading...</div>

  <script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQN-HyD_xL7wseQE98-OGlyG7pxnC6FCOITOrBkb0uAoGYBDZPQetginAMafuOtSA6MUct_lEuKpaTG/pub?gid=964797632&single=true&output=csv";

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          row.push(current.trim());
          current = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i++;
          if (current.length > 0 || row.length > 0) {
            row.push(current.trim());
            rows.push(row);
            row = [];
            current = "";
          }
        } else {
          current += char;
        }
      }

      if (current.length > 0 || row.length > 0) {
        row.push(current.trim());
        rows.push(row);
      }

      return rows;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalize(value) {
      return String(value || "")
        .replace(/\s+/g, " ")
        .replace(/^"+|"+$/g, "")
        .trim();
    }

    fetch(sheetUrl)
      .then(response => response.text())
      .then(csv => {
        const rows = parseCSV(csv);

        if (!rows.length) {
          document.getElementById("table-container").innerHTML = "No data found.";
          return;
        }

        const headers = rows[0].map(h => normalize(h).toLowerCase());

        const idxName = headers.findIndex(h => h.includes("property name"));
        const idxAddress = headers.findIndex(h => h.includes("property address") || h.includes("address"));
        const idxManager = headers.findIndex(h => h.includes("assigned manager"));
        const idxEmail = headers.findIndex(h => h === "email" || h.includes("email"));
        const idxHandles = headers.findIndex(h => h.includes("notes") || h.includes("handles"));

        let html = "";

        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          if (!row || row.every(cell => !String(cell).trim())) continue;

          const name = normalize(row[idxName] || "");
          const address = normalize(row[idxAddress] || "");
          const manager = normalize(row[idxManager] || "");
          const email = normalize(row[idxEmail] || "");
          const handles = normalize(row[idxHandles] || "");

          html += `
            <div class="property">
              <div class="property-field"><span class="label">Name:</span> ${escapeHtml(name)}</div>
              <div class="property-field"><span class="label">Address:</span> ${escapeHtml(address)}</div>
              <div class="property-field"><span class="label">Manager:</span> ${escapeHtml(manager)}</div>
              <div class="property-field"><span class="label">Email:</span> ${escapeHtml(email)}</div>
              <div class="property-field"><span class="label">Handles:</span> ${escapeHtml(handles)}</div>
            </div>
          `;
        }

        document.getElementById("table-container").innerHTML = html || "No property records found.";
      })
      .catch(error => {
        document.getElementById("table-container").innerHTML = "Error loading data.";
        console.error(error);
      });
  </script>
</body>
</html>
